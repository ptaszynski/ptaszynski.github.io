<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Michal Ptaszynski / Publications</title>

	<meta name="author" content="Michal Ptaszynski">
	<meta name="description" content="Publications by Michal Ptaszynski — books, journals, conference and workshop papers. Searchable and filterable.">

	<link rel="alternate" hreflang="en" href="publications.htm">
	<link rel="alternate" hreflang="x-default" href="publications.htm">
	<link rel="icon" href="images/favico.ico" type="image/x-icon">
	<link rel="stylesheet" href="assets/site.css">
	<script src="assets/site.js" defer></script>

	<style>
		/* Publications-specific UI */
		.pubs-toolbar {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: .65rem;
			align-items: center;
			margin: .85rem 0 .65rem;
			padding: .6rem .9rem;
			background: var(--surface);
			border: 1px solid var(--line);
			border-radius: var(--radius-lg);
			position: sticky;
			top: 60px;
			z-index: 10;
		}
		.pubs-search {
			display: flex;
			gap: .5rem;
			align-items: center;
		}
		.pubs-search input {
			width: 100%;
			padding: .55rem .8rem;
			font-family: var(--font-sans);
			font-size: .95rem;
			color: var(--ink);
			background: var(--bg);
			border: 1px solid var(--line-strong);
			border-radius: var(--radius);
		}
		.pubs-search input:focus {
			outline: 2px solid var(--accent);
			outline-offset: 1px;
			border-color: var(--accent);
		}
		.pubs-count {
			font-family: var(--font-sans);
			font-size: .85rem;
			color: var(--muted);
			white-space: nowrap;
		}
		.pubs-filters {
			grid-column: 1 / -1;
			display: flex;
			flex-wrap: wrap;
			gap: .35rem;
			margin-top: .25rem;
		}
		.filter-btn {
			font-family: var(--font-sans);
			font-size: .8rem;
			padding: .3rem .7rem;
			background: var(--bg);
			color: var(--ink-soft);
			border: 1px solid var(--line);
			border-radius: 999px;
			cursor: pointer;
			transition: background .15s ease, color .15s ease, border-color .15s ease;
		}
		.filter-btn:hover { color: var(--accent); border-color: var(--accent-soft); }
		.filter-btn.is-active {
			background: var(--accent);
			color: #fff;
			border-color: var(--accent);
		}
		:root[data-theme="dark"] .filter-btn.is-active { color: var(--bg); }

		.pub-section {
			margin: 1.25rem 0 .4rem;
			font-family: var(--font-sans);
			font-size: .75rem;
			text-transform: uppercase;
			letter-spacing: .12em;
			color: var(--muted);
			padding-bottom: .3rem;
			border-bottom: 1px solid var(--line);
			scroll-margin-top: 8rem;
		}

		.pub {
			display: grid;
			grid-template-columns: 44px 1fr;
			gap: .75rem;
			padding: .55rem 0;
			border-bottom: 1px dashed var(--line);
			align-items: start;
		}
		.pub:last-child { border-bottom: 0; }
		.pub__cover {
			width: 44px;
			min-height: 1px;
		}
		.pub__cover img {
			width: 100%;
			height: auto;
			border-radius: 3px;
			box-shadow: var(--shadow);
		}
		.pub__cover--empty {
			height: 44px;
			background: var(--accent-bg);
			border-radius: 3px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--accent);
			font-size: 1rem;
			opacity: .5;
		}
		.pub__body { min-width: 0; }
		.pub__title {
			font-family: var(--font-sans);
			font-weight: 600;
			color: var(--ink);
			font-size: .92rem;
			margin: 0 0 .1rem;
			line-height: 1.35;
		}
		.pub__title em { font-style: italic; font-weight: 600; }
		.pub__authors {
			font-size: .82rem;
			color: var(--ink-soft);
			margin: 0 0 .1rem;
			line-height: 1.4;
		}
		.pub__authors strong {
			color: var(--ink);
			background: var(--accent-bg);
			padding: 0 3px;
			border-radius: 2px;
		}
		.pub__venue {
			font-size: .78rem;
			color: var(--muted);
			margin: 0 0 .2rem;
			font-style: italic;
			line-height: 1.4;
		}
		.pub__meta {
			display: flex;
			flex-wrap: wrap;
			gap: .25rem .7rem;
			font-family: var(--font-sans);
			font-size: .75rem;
			align-items: center;
			margin-top: .15rem;
		}
		.pub__year {
			color: var(--muted);
			padding: .05rem .45rem;
			background: var(--accent-bg);
			border-radius: 999px;
			font-size: .7rem;
		}
		.pub__link {
			color: var(--accent);
			border: 0;
			padding: 0;
		}
		.pub__link:hover { color: var(--accent-soft); }

		.pub__bib-wrap {
			position: relative;
			display: inline-block;
		}
		.pub__bib-btn {
			font-family: var(--font-sans);
			font-size: .7rem;
			background: transparent;
			color: var(--muted);
			border: 1px solid var(--line);
			border-radius: 3px;
			padding: .05rem .4rem;
			cursor: pointer;
			transition: background .15s, color .15s, border-color .15s;
			display: inline-flex;
			align-items: center;
			gap: .25rem;
			line-height: 1.3;
		}
		.pub__bib-btn:hover,
		.pub__bib-btn:focus-visible {
			color: var(--accent);
			border-color: var(--accent-soft);
			background: var(--accent-bg);
		}
		.pub__bib-btn.is-copied {
			color: var(--accent);
			border-color: var(--accent);
			background: var(--accent-bg);
		}
		.pub__bib-btn .pub__bib-icon {
			width: 11px;
			height: 11px;
			display: inline-block;
			vertical-align: -1px;
		}

		.pub__bib-card {
			display: none;
			position: absolute;
			z-index: 30;
			top: calc(100% + 6px);
			right: 0;
			min-width: 280px;
			max-width: min(520px, 90vw);
			padding: .5rem .65rem;
			background: var(--surface);
			border: 1px solid var(--line-strong);
			border-radius: var(--radius);
			font-family: var(--font-mono);
			font-size: .7rem;
			color: var(--ink-soft);
			white-space: pre;
			overflow-x: auto;
			line-height: 1.5;
			box-shadow: 0 6px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
			pointer-events: none;
		}
		:root[data-theme="dark"] .pub__bib-card { box-shadow: 0 6px 24px rgba(0,0,0,0.6); }
		.pub__bib-wrap:hover .pub__bib-card,
		.pub__bib-btn:focus-visible + .pub__bib-card,
		.pub__bib-card.is-pinned { display: block; }
		.pub__bib-card__hint {
			display: block;
			margin-top: .35rem;
			padding-top: .3rem;
			border-top: 1px dashed var(--line);
			font-family: var(--font-sans);
			font-size: .65rem;
			color: var(--muted);
			text-align: right;
			white-space: normal;
		}
		.pub__bib-card.is-copied .pub__bib-card__hint {
			color: var(--accent);
			font-weight: 600;
		}

		.pubs-empty {
			text-align: center;
			padding: 3rem 1rem;
			color: var(--muted);
			font-style: italic;
		}

		@media (max-width: 600px) {
			.pubs-toolbar { grid-template-columns: 1fr; }
			.pub { grid-template-columns: 36px 1fr; gap: .6rem; }
			.pub__cover { width: 36px; }
			.pub__cover--empty { height: 36px; }
		}
	</style>
</head>

<body>

<div data-include="header"></div>

<main id="main" class="page page--wide">

	<h1 class="page-title">Publications</h1>
	<p class="page-lede">
		Books, journals, conference and workshop papers — search by keyword, filter by type or year.
		<span id="pubs-status" class="muted small"></span>
	</p>

	<div class="pubs-toolbar" role="search">
		<div class="pubs-search">
			<input type="search" id="pubs-q" placeholder="Search title, author, venue…" aria-label="Search publications">
		</div>
		<div class="pubs-count"><span id="pubs-shown">…</span> shown</div>
		<div class="pubs-filters" id="pubs-filters" role="group" aria-label="Filter by type">
			<!-- Filled by JS -->
		</div>
	</div>

	<div id="pubs-list" aria-live="polite">
		<p class="pubs-empty" id="pubs-loading">Loading publications…</p>
	</div>

</main>

<div data-include="footer"></div>

<script>
(function () {
	"use strict";

	const TYPE_META = {
		book:         { label: "Books & Chapters",         emoji: "📚" },
		journal:      { label: "Journals",                 emoji: "📰" },
		conference:   { label: "International Conferences", emoji: "🌐" },
		local:        { label: "Local / Workshops",        emoji: "🏛" },
		patent:       { label: "Patents & Standards",      emoji: "📜" },
		dissertation: { label: "Dissertations",            emoji: "🎓" },
		other:        { label: "Other",                    emoji: "✦" },
	};
	const TYPE_ORDER = ["book", "journal", "conference", "local", "patent", "dissertation", "other"];

	const state = {
		all: [],
		filter: "all",   // "all" or one of TYPE_ORDER
		query: "",
	};

	const el = (sel) => document.querySelector(sel);
	const fmt = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

	function highlightSelf(authors) {
		if (!authors) return "";
		return fmt(authors).replace(/(Michal[ae]? Pta[sz][zh]y[nń]ski|Michał Ptaszyński|Michal E\. Ptaszynski)/g,
			"<strong>$1</strong>");
	}

	// ---- BibTeX generation -------------------------------------

	const BIBTEX_TYPE = {
		book: "inbook",          // covers both authored book and chapter
		journal: "article",
		conference: "inproceedings",
		local: "inproceedings",
		patent: "misc",
		dissertation: "phdthesis",
		other: "misc",
	};

	const STOPWORDS = new Set("a,an,the,of,on,in,for,and,or,to,with,from,by,is,are,as,at,its,using,based,study,analysis,approach,model,models,method,methods,toward,towards,using".split(","));

	function asciiSlug(s, maxLen = 20) {
		// Strip diacritics, then non-alphanumerics
		const norm = (s || "").normalize("NFKD").replace(/[̀-ͯ]/g, "");
		return norm.replace(/[^A-Za-z0-9]+/g, "").slice(0, maxLen);
	}

	function firstAuthorSurname(authors) {
		if (!authors) return "Anon";
		// First author = first comma-or-"and"-separated chunk
		const first = authors.split(/\s*,\s*|\s+(?:and|&)\s+/i)[0].trim();
		if (!first) return "Anon";
		// CJK names: surname comes first
		if (/^[぀-ヿ一-鿿]/.test(first)) {
			const tok = first.split(/[\s・]+/)[0];
			return asciiSlug(tok, 25) || "Anon";
		}
		// "LASTNAME, First" form (rare in this data, but supported)
		const toks = first.split(/\s+/);
		// Pick all-uppercase token as surname if exactly one exists
		const upper = toks.filter(t => t.length >= 3 && t === t.toUpperCase());
		if (upper.length === 1) return asciiSlug(upper[0], 25) || "Anon";
		// Default: last whitespace token (Western convention)
		const surname = toks[toks.length - 1] || first;
		return asciiSlug(surname, 25) || "Anon";
	}

	function firstSignificantTitleWord(title) {
		const words = (title || "").split(/\s+/);
		for (const w of words) {
			const clean = w.replace(/[^A-Za-z]/g, "");
			if (clean.length >= 3 && !STOPWORDS.has(clean.toLowerCase())) {
				return clean.charAt(0).toUpperCase() + clean.slice(1).toLowerCase();
			}
		}
		// Fallback: first non-empty
		for (const w of words) {
			const c = w.replace(/[^A-Za-z]/g, "");
			if (c) return c.charAt(0).toUpperCase() + c.slice(1).toLowerCase();
		}
		return "Paper";
	}

	function bibKey(p) {
		const sur = firstAuthorSurname(p.authors);
		const yr = p.year || "nd";
		const tw = firstSignificantTitleWord(p.title);
		return `${sur}${yr}${tw}`;
	}

	function bibAuthors(authors) {
		// Handle comma-separated and "X, Y, and Z" / "X and Y" English-style separators.
		// Each name "First Middle Last" → "Last, First Middle".
		if (!authors) return "";
		return authors
			.split(/\s*,\s*|\s+(?:and|&)\s+/i)
			.map(s => s.trim().replace(/^(?:and|&)\s+/i, "").replace(/[:：;]+$/, ""))
			.filter(Boolean)
			.map(name => {
				const parts = name.split(/\s+/);
				if (parts.length === 1) return parts[0];
				const surname = parts.pop();
				return `${surname}, ${parts.join(" ")}`;
			})
			.join(" and ");
	}

	function bibEscape(v) {
		// BibTeX-safe: keep braces minimal; escape stray % and #
		return String(v).replace(/[%#&$_]/g, (c) => "\\" + c);
	}

	function bestUrl(p) {
		if (!p.links || !p.links.length) return null;
		// Prefer DOI / Springer / official publisher over PDF dumps
		const priority = [/doi\.org/i, /link\.springer/i, /sciencedirect/i,
		                  /mdpi\.com/i, /aclanthology/i, /ieeexplore/i,
		                  /tandfonline/i, /onlinelibrary\.wiley/i, /dl\.acm\.org/i];
		for (const re of priority) {
			const m = p.links.find(l => re.test(l.url || ""));
			if (m) return m.url;
		}
		return p.links[0].url;
	}

	function extractDoi(text) {
		const m = (text || "").match(/10\.\d{4,9}\/[-._;()/:A-Z0-9]+/i);
		return m ? m[0].replace(/[.,;)]+$/, "") : null;
	}

	// Parse a free-form venue string into structured BibTeX fields.
	function parseVenue(venue) {
		const out = {};
		if (!venue) return out;
		const s = venue.replace(/\|\|[^|]*\|\|?/g, " ").replace(/\s+/g, " ").trim();

		// ISBN (10 or 13 digits, hyphens OK)
		const isbn = s.match(/ISBN[:\s]*((?:97[89][\d\-\s]{10,17}|[\d\-\s]{9,12}[\dXx]))/i);
		if (isbn) {
			const digits = isbn[1].replace(/[^\dXx]/g, "");
			if (digits.length === 10 || digits.length === 13) out.isbn = digits;
		}
		// DOI
		const doi = s.match(/10\.\d{4,9}\/[-._;()/:A-Z0-9]+/i);
		if (doi) out.doi = doi[0].replace(/[.,;)]+$/, "");
		// Volume: require dot after "Vol"/"v" so "Voluminous"/"Volga" can't match
		const vol = s.match(/\b(?:Vol\.|Volume|v\.)\s*(\d+)/i);
		if (vol) out.volume = vol[1];
		// Number / Issue: same — require dot/space terminator so "November" can't match "No"
		const num = s.match(/\b(?:No\.|Number|Issue|Iss\.)\s+([\w-]+)/i);
		if (num) out.number = num[1];
		// Pages: "pp. 1-31" or "pp. 1–31" or "p. 12"
		const pages = s.match(/\bpp?\.\s*(\d+(?:\s*[-–—~]\s*\d+)?)/i);
		if (pages) out.pages = pages[1].replace(/\s*[-–—~]\s*/, "--");
		// Month
		const mon = s.match(/\b(Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\b/);
		if (mon) out.month = mon[1].slice(0, 3).toLowerCase();
		// Address: "City, ..., USA/Japan/UK/Germany/France/Poland/China/Spain/Italy"
		const addr = s.match(/([A-ZŁŚŻŹĆĘÓŃĄ][\w'.\-]+(?:\s+[A-ZŁŚŻŹĆĘÓŃĄ][\w'.\-]+)*(?:,\s*[A-ZŁŚŻŹĆĘÓŃĄ][\w'.\-]+(?:\s+[A-ZŁŚŻŹĆĘÓŃĄ][\w'.\-]+)*)?,\s*(?:USA|Japan|UK|United Kingdom|United States|Germany|France|Poland|China|Spain|Italy|Canada|Australia|India|Korea|Singapore|Brazil|Mexico|Russia|Sweden|Norway|Finland|Netherlands|Belgium|Switzerland|Austria|Portugal|Greece|Turkey|Argentina))/);
		if (addr) out.address = addr[1];

		// Venue NAME: strip "In Proceedings of/the" prefix, then take everything up to first comma / dot followed by Vol/Issue/pp/ISBN/year
		let name = s.replace(/^In\s+(Proceedings\s+of\s+(The|the)?\s+)?/i, "");
		name = name.split(/\s*[,.]\s*(?=Vol\.?|Volume|v\.|No\.?|Number|Issue|Iss\.?|pp?\.|paper\s*ID|ID\.|ISBN|publ\.|publi(?:shed|cation)|Pages?\b|\(\s*Impact|\b\d{4}\b)/i)[0];
		name = name.replace(/^["'\s]+|["'\s,.]+$/g, "").trim();
		out.name = name;

		return out;
	}

	function generateBibtex(p) {
		if (p.bibtex) return p.bibtex.trim();  // explicit override wins
		const type = BIBTEX_TYPE[p.type] || "misc";
		const key = bibKey(p);
		const v = parseVenue(p.venue);
		const fields = [];
		const push = (k, val) => (val != null && val !== "") && fields.push(`  ${k} = {${bibEscape(val)}}`);
		push("author", bibAuthors(p.authors));
		push("title",  p.title);
		push("year",   p.year);
		const venueField =
			type === "article"       ? "journal" :
			type === "inproceedings" ? "booktitle" :
			type === "inbook"        ? "booktitle" :
			type === "phdthesis"     ? "school" : "howpublished";
		push(venueField, v.name || p.venue);
		push("volume",  v.volume);
		push("number",  v.number);
		push("pages",   v.pages);
		push("month",   v.month);
		push("address", v.address);
		push("isbn",    v.isbn);
		const doi = v.doi || extractDoi((p.links || []).map(l => l.url || "").join(" "));
		if (doi) push("doi", doi);
		const url = bestUrl(p);
		if (url) push("url", url);
		return `@${type}{${key},\n${fields.join(",\n")}\n}`;
	}

	function renderPub(p) {
		const cover = p.image
			? `<div class="pub__cover"><img src="${fmt(p.image)}" alt="" loading="lazy" onerror="this.parentNode.classList.add('pub__cover--empty');this.remove();this.parentNode.textContent=this.parentNode.dataset.fallback||''" data-fallback="${(TYPE_META[p.type]||{}).emoji||''}"></div>`
			: `<div class="pub__cover pub__cover--empty">${(TYPE_META[p.type]||{}).emoji||""}</div>`;

		const links = (p.links || []).map(l =>
			`<a class="pub__link" href="${fmt(l.url)}" rel="noopener">${fmt(l.label)} ↗</a>`
		).join("");

		const year = p.year ? `<span class="pub__year">${p.year}</span>` : "";
		const bib = generateBibtex(p);
		const bibBtn =
			`<span class="pub__bib-wrap">` +
				`<button type="button" class="pub__bib-btn" aria-describedby="bib-${fmt(p.id)}" aria-label="Copy BibTeX to clipboard"><svg class="pub__bib-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5h8a2 2 0 0 1 2 2v12"/><rect x="5" y="3" width="10" height="16" rx="1"/></svg>BibTeX</button>` +
				`<span class="pub__bib-card" id="bib-${fmt(p.id)}" role="tooltip"><code>${fmt(bib)}</code><span class="pub__bib-card__hint">click to copy</span></span>` +
			`</span>`;

		return `
			<article class="pub" data-type="${p.type}" data-year="${p.year || ''}">
				${cover}
				<div class="pub__body">
					<h3 class="pub__title">${fmt(p.title)}</h3>
					<p class="pub__authors">${highlightSelf(p.authors)}</p>
					${p.venue ? `<p class="pub__venue">${fmt(p.venue)}</p>` : ""}
					<div class="pub__meta">${year}${links}${bibBtn}</div>
				</div>
			</article>
		`;
	}

	function matchQuery(p, q) {
		if (!q) return true;
		const hay = (p.title + " " + p.authors + " " + p.venue + " " + (p.year || ""))
			.toLowerCase();
		return q.toLowerCase().split(/\s+/).every(tok => hay.includes(tok));
	}

	function render() {
		const list = el("#pubs-list");
		const filtered = state.all.filter(p =>
			(state.filter === "all" || p.type === state.filter) && matchQuery(p, state.query)
		);

		if (!filtered.length) {
			list.innerHTML = `<p class="pubs-empty">No publications match your filters.</p>`;
			el("#pubs-shown").textContent = "0";
			return;
		}

		// Group by type for headings; respect TYPE_ORDER
		const groups = {};
		filtered.forEach(p => { (groups[p.type] = groups[p.type] || []).push(p); });

		let html = "";
		TYPE_ORDER.forEach(t => {
			if (!groups[t] || !groups[t].length) return;
			html += `<h2 class="pub-section" id="t-${t}">${TYPE_META[t].emoji} ${TYPE_META[t].label} <span style="font-weight:400; color:var(--muted); text-transform:none; letter-spacing:0;">· ${groups[t].length}</span></h2>`;
			groups[t].forEach(p => { html += renderPub(p); });
		});

		list.innerHTML = html;
		el("#pubs-shown").textContent = filtered.length;
	}

	function buildFilters() {
		const counts = { all: state.all.length };
		state.all.forEach(p => { counts[p.type] = (counts[p.type] || 0) + 1; });
		const wrap = el("#pubs-filters");
		const all = `<button class="filter-btn is-active" data-type="all" type="button">All · ${counts.all}</button>`;
		const typed = TYPE_ORDER.filter(t => counts[t]).map(t =>
			`<button class="filter-btn" data-type="${t}" type="button">${TYPE_META[t].label} · ${counts[t]}</button>`
		).join("");
		wrap.innerHTML = all + typed;

		wrap.addEventListener("click", (e) => {
			const btn = e.target.closest(".filter-btn");
			if (!btn) return;
			wrap.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("is-active"));
			btn.classList.add("is-active");
			state.filter = btn.dataset.type;
			render();
		});
	}

	function bindSearch() {
		let t;
		el("#pubs-q").addEventListener("input", (e) => {
			clearTimeout(t);
			t = setTimeout(() => {
				state.query = e.target.value.trim();
				render();
			}, 120);
		});
	}

	function bindBibtex() {
		// Click the BibTeX button → copy to clipboard, flash confirmation.
		// Hovering / focusing the button shows the floating preview card (pure CSS).
		document.addEventListener("click", (e) => {
			const btn = e.target.closest(".pub__bib-btn");
			if (!btn) return;
			const wrap = btn.parentNode;
			const card = wrap && wrap.querySelector(".pub__bib-card");
			const code = card && card.querySelector("code");
			const text = code ? code.textContent : "";
			const hint = card && card.querySelector(".pub__bib-card__hint");

			const done = () => {
				btn.classList.add("is-copied");
				if (card) card.classList.add("is-copied");
				if (hint) hint.textContent = "✓ copied to clipboard";
				setTimeout(() => {
					btn.classList.remove("is-copied");
					if (card) card.classList.remove("is-copied");
					if (hint) hint.textContent = "click to copy";
				}, 1500);
			};
			const fallback = () => {
				if (!code) return;
				const r = document.createRange();
				r.selectNodeContents(code);
				const sel = window.getSelection();
				sel.removeAllRanges(); sel.addRange(r);
				try { document.execCommand("copy"); done(); sel.removeAllRanges(); }
				catch (_) { if (hint) hint.textContent = "press ⌘/Ctrl+C"; }
			};

			if (navigator.clipboard && navigator.clipboard.writeText) {
				navigator.clipboard.writeText(text).then(done, fallback);
			} else {
				fallback();
			}
		});
	}

	function applyUrlQuery() {
		// Honor ?q=... so research-page citation links can deep-link
		// into a pre-filtered Publications view. Also accepts ?type=...
		// for type-filter deep-links.
		const params = new URLSearchParams(location.search);
		const q = params.get("q");
		if (q) {
			state.query = q;
			const input = el("#pubs-q");
			if (input) input.value = q;
		}
		const type = params.get("type");
		if (type) state.filter = type;
	}

	async function init() {
		try {
			const r = await fetch("assets/publications.json", { cache: "no-cache" });
			if (!r.ok) throw new Error("HTTP " + r.status);
			const data = await r.json();
			state.all = data.publications || [];
			el("#pubs-status").textContent = ` ${state.all.length} entries total.`;
			buildFilters();
			bindSearch();
			bindBibtex();
			applyUrlQuery();
			// Reflect filter state in the chip UI after applyUrlQuery may have set it.
			document.querySelectorAll("#pubs-filters .filter-btn").forEach(b => {
				b.classList.toggle("is-active", b.dataset.type === state.filter);
			});
			render();
		} catch (e) {
			el("#pubs-list").innerHTML =
				`<p class="pubs-empty">Couldn’t load publications data. ` +
				`(If you are viewing this file directly with <code>file://</code>, ` +
				`run a local server: <code>python3 -m http.server</code> in the site folder.)</p>`;
			console.error(e);
		}
	}

	init();
})();
</script>

</body>
</html>
